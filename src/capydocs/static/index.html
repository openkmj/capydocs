<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>capydocs</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Markdown preview -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- CodeMirror 6 via CDN -->
    <script type="module" src="/js/app.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">capydocs</h1>
                <div style="display:flex;gap:4px;">
                    <button id="btn-new" class="btn btn-sm" title="New file">+ File</button>
                    <button id="btn-new-folder" class="btn btn-sm" title="New folder">+ Folder</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search files..." />
            </div>
            <div id="file-tree" class="file-tree"></div>
        </aside>
        <main class="main">
            <div class="toolbar">
                <div class="toolbar-left">
                    <span id="current-file" class="current-file">No file selected</span>
                    <span id="btn-rename" class="toolbar-icon" title="Rename">✏️</span>
                </div>
                <div class="toolbar-right">
                    <button id="btn-preview" class="btn btn-sm" title="Toggle preview">Preview</button>
                    <button id="btn-save" class="btn btn-primary btn-sm" title="Save (Ctrl+S)">Save</button>
                    <button id="btn-delete" class="btn btn-danger btn-sm" title="Delete file">Delete</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <div id="editor-container" class="editor-container">
                    <div id="editor-placeholder" class="editor-placeholder">
                        Select a file from the sidebar to start editing
                    </div>
                </div>
                <div id="preview-container" class="preview-container"></div>
            </div>
        </main>
    </div>
</body>
</html>
